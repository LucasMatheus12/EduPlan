# Deploy do Next.js na Netlify (defina em Site settings → Build → Base directory: eduPlan, se o repo for a raiz)
# Documentação: https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
